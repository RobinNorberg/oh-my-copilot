name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view oh-my-copilot@$VERSION version 2>/dev/null; then
            echo "::warning::Version $VERSION already published to npm, skipping publish"
          else
            if echo "$VERSION" | grep -qE '(alpha|beta|rc|preview)'; then
              npm publish --access public --tag preview --provenance
            else
              npm publish --access public --provenance
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
