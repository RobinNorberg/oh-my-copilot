name: Upgrade Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: upgrade-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upgrade-test:
    name: omcp update + session-start hook
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The globally-installed omcp (from npm) may still read CLAUDE_CONFIG_DIR,
      # while the local build reads COPILOT_CONFIG_DIR. Pin both to the same
      # path so omcp update and verification agree on where hooks live.
      COPILOT_CONFIG_DIR: /home/runner/.copilot
      CLAUDE_CONFIG_DIR: /home/runner/.copilot

    steps:
      # ── 1. Environment ──────────────────────────────────────────────────────

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # ── 2. Install Copilot CLI ────────────────────────────────────────────────
      # Keep Copilot CLI installed in CI so the upgrade path still runs in a
      # realistic environment, but avoid relying on Copilot runtime behavior for
      # hook verification. Step 6 validates the installed SessionStart hook
      # directly from repo-owned artifacts and therefore runs on push + PR.

      - name: Install Copilot CLI
        run: |
          npm install -g @github/copilot
          copilot --version

      - name: Verify Copilot CLI is on PATH
        run: which copilot

      # ── 3. Install omcp@latest via npm ────────────────────────────────────────
      # Establishes the "old version" baseline before `omcp update` is run.

      - name: Install omcp latest via npm
        run: npm install -g oh-my-copilot@latest

      - name: Verify omcp installed
        run: |
          omcp --version > "$RUNNER_TEMP/omcp-pre-update.version" 2>&1
          VERSION_EXIT=$?
          INSTALLED_VERSION=$(cat "$RUNNER_TEMP/omcp-pre-update.version")

          if [ "$VERSION_EXIT" -ne 0 ]; then
            echo "FAIL: omcp --version exited with code $VERSION_EXIT"
            cat "$RUNNER_TEMP/omcp-pre-update.version"
            exit 1
          fi

          echo "Installed omcp version: $INSTALLED_VERSION"

      # ── 4. Run omcp update and verify clean stdout only ───────────────────────
      # omcp update must:
      #   - Exit 0
      #   - Produce zero stderr
      # Any npm warnings, git warnings, or sync messages to stderr are failures.
      # Note: syncMarketplaceClone() is best-effort and skips gracefully when
      # the marketplace clone (~/.copilot/plugins/marketplaces/omcp/) doesn't exist,
      # so CI runners with a fresh home directory are handled correctly.

      - name: Run omcp update
        id: omcp-update
        env:
          # Suppress npm update progress bar to keep stdout clean
          npm_config_progress: 'false'
        run: |
          set -o pipefail

          # Capture exit code of omcp update itself (PIPESTATUS[0])
          # npm install may emit deprecation warnings to stderr — those are not
          # omcp errors. Filter those out and fail on everything else.
          omcp update 1>"$RUNNER_TEMP/omcp-update.stdout.log" 2>"$RUNNER_TEMP/omcp-update.stderr.log"
          UPDATE_EXIT=$?

          # Check for non-npm stderr (omcp warnings/errors/exceptions)
          # Exclude npm deprecation warnings: "npm deprecated ..." or lines not starting with npm/
          # All other stderr lines (omcp console.warn, error, exception, fail patterns) are failures.
          if grep -vE '^npm deprecated ' "$RUNNER_TEMP/omcp-update.stderr.log" 2>/dev/null | grep -qiE '^(error|exception|fail|critical|warn|omcp)'; then
            echo "FAIL: omcp update produced stderr:"
            cat "$RUNNER_TEMP/omcp-update.stderr.log"
            echo "Full stdout:"
            cat "$RUNNER_TEMP/omcp-update.stdout.log"
            exit 1
          fi

          if [ "$UPDATE_EXIT" -ne 0 ]; then
            echo "FAIL: omcp update exited with code $UPDATE_EXIT"
            cat "$RUNNER_TEMP/omcp-update.stdout.log"
            exit 1
          fi

          echo "PASS: omcp update succeeded"

      - name: Debug - list config dir contents
        if: always()
        run: |
          echo "COPILOT_CONFIG_DIR=$COPILOT_CONFIG_DIR"
          echo "CLAUDE_CONFIG_DIR=$CLAUDE_CONFIG_DIR"
          echo "--- ~/.copilot ---"
          find "$HOME/.copilot" -type f 2>/dev/null || echo "(empty or missing)"
          echo "--- ~/.claude ---"
          find "$HOME/.claude" -type f 2>/dev/null || echo "(empty or missing)"
          echo "--- COPILOT_CONFIG_DIR contents ---"
          find "$COPILOT_CONFIG_DIR" -type f 2>/dev/null || echo "(empty or missing)"
          echo "--- omcp update stdout ---"
          cat "$RUNNER_TEMP/omcp-update.stdout.log" 2>/dev/null || echo "(no stdout log)"
          echo "--- omcp update stderr ---"
          cat "$RUNNER_TEMP/omcp-update.stderr.log" 2>/dev/null || echo "(no stderr log)"

      # ── 5. Verify new omcp version installed ──────────────────────────────────

      - name: Verify omcp version after update
        run: |
          omcp --version > "$RUNNER_TEMP/omcp-post-update.version" 2>&1
          VERSION_EXIT=$?
          UPDATED_VERSION=$(cat "$RUNNER_TEMP/omcp-post-update.version")

          if [ "$VERSION_EXIT" -ne 0 ]; then
            echo "FAIL: omcp --version exited with code $VERSION_EXIT"
            cat "$RUNNER_TEMP/omcp-post-update.version"
            exit 1
          fi

          echo "Updated omcp version: $UPDATED_VERSION"
          if [ -z "$UPDATED_VERSION" ]; then
            echo "FAIL: omcp --version returned empty"
            exit 1
          fi
          echo "PASS: omcp version after update: $UPDATED_VERSION"

      # ── 6. Verify SessionStart hook wiring + execution ───────────────────────
      # Validate the update-owned coverage directly:
      #   - settings.json contains a SessionStart command for session-start.mjs
      #   - the installed standalone hook script exists
      #   - the hook script runs successfully on representative SessionStart JSON
      #
      # This keeps upgrade coverage inside OMCP-owned artifacts and avoids relying
      # on external Copilot CLI print-mode behavior in headless CI.
      - name: Verify SessionStart hook wiring and script
        run: |
          set -o pipefail

          COPILOT_DIR="${COPILOT_CONFIG_DIR:-$HOME/.copilot}"
          SESSION_HOOK="$COPILOT_DIR/hooks/session-start.mjs"
          SETTINGS_PATH="$COPILOT_DIR/settings.json"

          if [ ! -f "$SESSION_HOOK" ]; then
            echo "FAIL: missing SessionStart hook script at $SESSION_HOOK"
            exit 1
          fi

          if [ ! -f "$SETTINGS_PATH" ]; then
            echo "FAIL: missing Copilot CLI settings at $SETTINGS_PATH"
            exit 1
          fi

          SESSION_COMMAND="$(node -e '
            const fs = require("fs");
            const settings = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            const groups = settings.hooks?.SessionStart ?? [];
            const command = groups
              .flatMap(group => group?.hooks ?? [])
              .find(hook => hook?.type === "command" && typeof hook.command === "string" && hook.command.includes("session-start.mjs"))
              ?.command ?? "";
            process.stdout.write(command);
          ' "$SETTINGS_PATH")"

          if [ -z "$SESSION_COMMAND" ]; then
            echo "FAIL: settings.json is missing a SessionStart command for session-start.mjs"
            cat "$SETTINGS_PATH"
            exit 1
          fi

          printf '%s' \
            "{\"hook_event_name\":\"SessionStart\",\"session_id\":\"ci-upgrade-test\",\"cwd\":\"$GITHUB_WORKSPACE\"}" \
            | node "$SESSION_HOOK" 1>"$RUNNER_TEMP/session.stdout.log" 2>"$RUNNER_TEMP/session.stderr.log"

          if [ -s "$RUNNER_TEMP/session.stderr.log" ]; then
            echo "FAIL: SessionStart hook produced stderr:"
            cat "$RUNNER_TEMP/session.stderr.log"
            echo "stdout:"
            cat "$RUNNER_TEMP/session.stdout.log"
            exit 1
          fi

          node -e '
            const fs = require("fs");
            const output = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (output.continue !== true) {
              throw new Error("SessionStart hook did not return continue=true");
            }
            const hookName = output.hookSpecificOutput?.hookEventName;
            if (hookName !== undefined && hookName !== "SessionStart") {
              throw new Error(`Unexpected hookSpecificOutput.hookEventName: ${hookName}`);
            }
          ' "$RUNNER_TEMP/session.stdout.log"

          echo "PASS: SessionStart hook is configured and executes cleanly"
